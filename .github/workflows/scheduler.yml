name: AI Affiliate Pipeline

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}" >> .env
          echo "TELEGRAM_CHANNEL_USERNAME=${{ secrets.TELEGRAM_CHANNEL_USERNAME }}" >> .env
          echo "TELEGRAM_OWNER_ID=${{ secrets.TELEGRAM_OWNER_ID }}" >> .env
          echo "TELEGRAM_ADMIN_CHAT_ID=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}" >> .env

      - name: Ensure directory structure
        run: |
          mkdir -p assets/output
          mkdir -p data

      - name: Initialize data files
        run: |
          if [ ! -s data/published_posts.csv ]; then
            echo "date,time,platform,topic,format,product,ai_source,post_length,message_id,status" > data/published_posts.csv
          fi
          if [ ! -s data/topic_history.json ]; then
            echo "[]" > data/topic_history.json
          fi
          if [ ! -s data/content_queue.json ]; then
            echo "[]" > data/content_queue.json
          fi
          if [ ! -s data/analytics.csv ]; then
            echo "date,metric,value" > data/analytics.csv
          fi

      - name: Run AI pipeline
        run: python -m src.main

      - name: Show report
        run: python -m src.main report

            - name: Save logs to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/Kursha88/ai-affiliate-agents.git
          git pull --rebase origin main || true
          git add data/topic_history.json data/published_posts.csv || true
          if git diff --staged --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Auto: update logs [skip ci]"
            git push origin main
          fi
          exit 0