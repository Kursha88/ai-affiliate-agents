name: AI Affiliate Agent - Daily Posts

on:
  schedule:
    # Запускаем 3 раза в день: 9:00, 15:00, 21:00 по Киеву (UTC+3)
    - cron: '0 6 * * *'   # 9:00 Kyiv
    - cron: '0 12 * * *'  # 15:00 Kyiv
    - cron: '0 18 * * *'  # 21:00 Kyiv
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run AI Agent
  env:
    TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
    GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    REFERRAL_LINK: ${{ secrets.REFERRAL_LINK }}
    BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
    GROQ_MODEL: 'llama-3.1-8b-instant'
  run: python main.py